<!DOCTYPE html>
<html>
<head>
  <title>Todo-notater</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<h1>Todo-notater</h1>

<!-- Lag ny liste / notat -->
<div class="ny-seksjon">
  <button onclick="visOpprettNotat()">Opprett notat</button>
  <button onclick="visOpprettListe()">Opprett liste</button>
</div>

<hr>

<!-- Liste med notater -->
<h2>Liste med notater</h2>
<ul id="notater-liste"></ul>

<!-- Opprett ny todo-liste -->
<div id="todo-seksjon" class="ny-seksjon">
  <h2>Oppretter ny Todo-liste</h2>
  <label>Tittel:</label>
  <input type="text" id="todo-tittel" placeholder="Handleliste"><br><br>

  <div id="tasks-container">
    <label><input type="checkbox"> Kjøpe melk</label><br>
    <label><input type="checkbox" checked> Kjøpe brød</label><br>
    <label><input type="checkbox"> Kjøpe egg</label><br>
  </div>

  <h3>Legg til oppgave</h3>
  <input type="text" id="ny-oppgave" placeholder="Ny oppgave">
  <button onclick="leggTilOppgave()">Legg til</button>
</div>

<script src="todo.js"></script>
</body>
</html>
